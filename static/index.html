<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Regional Newsroom Feedback Portal</title>
    <!-- Google Fonts: Inter & Outfit -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #131a26;
            --input-bg: #1e293b;
            --border-color: #334155;
            --text-primary: #f8fafc;
            --text-secondary: #94a3b8;
            --primary-gradient: linear-gradient(135deg, #3b82f6, #2563eb);
            --success-color: #10b981;
            --warning-color: #f59e0b;
            --danger-color: #ef4444;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            line-height: 1.5;
        }

        .container {
            width: 100%;
            max-width: 600px;
            margin: auto;
        }

        .header {
            text-align: center;
            margin-bottom: 2.5rem;
        }

        .header h1 {
            font-family: 'Outfit', sans-serif;
            font-size: 2.25rem;
            font-weight: 700;
            background: linear-gradient(to right, #60a5fa, #2563eb);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 0.5rem;
            letter-spacing: -0.025em;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
        }

        .card {
            background-color: var(--card-bg);
            border: 1px solid var(--border-color);
            border-radius: 1rem;
            padding: 2.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.3), 0 8px 10px -6px rgba(0, 0, 0, 0.3);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 20px 25px -5px rgba(59, 130, 246, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.4);
        }

        .form-group {
            margin-bottom: 1.5rem;
        }

        .form-group label {
            display: block;
            font-size: 0.875rem;
            font-weight: 600;
            color: var(--text-secondary);
            margin-bottom: 0.5rem;
        }

        textarea {
            width: 100%;
            min-height: 150px;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            resize: vertical;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        textarea:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.25);
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr;
            gap: 1.5rem;
        }

        @media (min-width: 480px) {
            .form-row {
                grid-template-columns: 1fr 1fr;
            }
        }

        select {
            width: 100%;
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 0.75rem 1rem;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s ease;
            cursor: pointer;
        }

        select:focus {
            border-color: #3b82f6;
        }

        .submit-btn {
            width: 100%;
            background: var(--primary-gradient);
            border: none;
            border-radius: 0.5rem;
            padding: 1rem;
            color: white;
            font-family: inherit;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.1s ease, box-shadow 0.2s ease, opacity 0.2s ease;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 0.5rem;
            margin-top: 1rem;
        }

        .submit-btn:hover {
            box-shadow: 0 4px 12px rgba(59, 130, 246, 0.4);
            transform: translateY(-1px);
        }

        .submit-btn:active {
            transform: translateY(1px);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }

        /* Loading Spinner */
        .spinner {
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            display: none;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Result Panel */
        .result-panel {
            display: none;
            margin-top: 2rem;
            padding-top: 2rem;
            border-top: 1px solid var(--border-color);
            animation: fadeIn 0.4s ease-out forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .result-title {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: #60a5fa;
        }

        .metrics-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 1rem;
            margin-bottom: 1.5rem;
        }

        .metric-card {
            background-color: var(--input-bg);
            border: 1px solid var(--border-color);
            border-radius: 0.5rem;
            padding: 1rem;
            text-align: center;
        }

        .metric-label {
            font-size: 0.75rem;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .metric-value {
            font-family: 'Outfit', sans-serif;
            font-size: 1.25rem;
            font-weight: 700;
        }

        /* Badges */
        .badge {
            display: inline-block;
            padding: 0.25rem 0.75rem;
            border-radius: 9999px;
            font-size: 0.875rem;
            font-weight: 600;
            text-transform: capitalize;
        }

        .badge-positive { background-color: rgba(16, 185, 129, 0.2); color: #34d399; }
        .badge-negative { background-color: rgba(239, 68, 68, 0.2); color: #f87171; }
        .badge-neutral { background-color: rgba(148, 163, 184, 0.2); color: #cbd5e1; }

        .badge-yes { background-color: rgba(245, 158, 11, 0.2); color: #fbbf24; }
        .badge-no { background-color: rgba(148, 163, 184, 0.2); color: #cbd5e1; }

        /* Urgency progress */
        .urgency-bar-container {
            width: 100%;
            background-color: var(--border-color);
            height: 8px;
            border-radius: 9999px;
            overflow: hidden;
            margin-top: 0.5rem;
        }

        .urgency-bar {
            height: 100%;
            border-radius: 9999px;
            transition: width 0.4s ease-out;
        }

        .error-message {
            color: var(--danger-color);
            font-size: 0.875rem;
            margin-top: 0.5rem;
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>Regional Newsroom</h1>
            <p>Audience Feedback & Correction Portal</p>
        </div>

        <div class="card">
            <form id="feedbackForm">
                <div class="form-group">
                    <label for="raw_text">Feedback Text</label>
                    <textarea id="raw_text" placeholder="Please describe any issues, incorrect facts, spelling errors, or general feedback about our articles..." required></textarea>
                    <div id="formError" class="error-message"></div>
                </div>

                <div class="form-group form-row">
                    <div>
                        <label for="language">Language (Optional)</label>
                        <select id="language">
                            <option value="">Auto-detect</option>
                            <option value="en">English</option>
                            <option value="hi">Hindi (हिन्दी)</option>
                            <option value="ta">Tamil (தமிழ்)</option>
                            <option value="te">Telugu (తెలుగు)</option>
                            <option value="mr">Marathi (मराठी)</option>
                            <option value="bn">Bengali (বাংলা)</option>
                        </select>
                    </div>
                    <div>
                        <label for="channel">Channel</label>
                        <select id="channel">
                            <option value="web" selected>Web Portal</option>
                            <option value="email">Email Submission</option>
                            <option value="whatsapp">WhatsApp Feed</option>
                        </select>
                    </div>
                </div>

                <button type="submit" id="submitBtn" class="submit-btn">
                    <span class="spinner" id="btnSpinner"></span>
                    <span id="btnText">Submit Feedback</span>
                </button>
            </form>

            <!-- Real-time AI processing results -->
            <div class="result-panel" id="resultPanel">
                <div class="result-title">
                    <span>⚡</span> AI Feedback Processing Result
                </div>
                <div class="metrics-grid">
                    <div class="metric-card">
                        <div class="metric-label">Sentiment</div>
                        <div id="resultSentiment" class="metric-value">Positive</div>
                    </div>
                    <div class="metric-card">
                        <div class="metric-label">Correction Request</div>
                        <div id="resultCorrection" class="metric-value">No</div>
                    </div>
                    <div class="metric-card" style="grid-column: span 2;">
                        <div class="metric-label">Urgency Score & Language (Detected: <span id="detectedLang">en</span>)</div>
                        <div style="display: flex; justify-content: space-between; align-items: center; margin-top: 0.25rem;">
                            <span id="resultUrgencyText" style="font-family: 'Outfit', sans-serif; font-weight: 700; font-size: 1.25rem;">3/10</span>
                            <div class="urgency-bar-container" style="width: 75%; margin-top: 0;">
                                <div class="urgency-bar" id="resultUrgencyBar" style="width: 30%; background-color: var(--success-color);"></div>
                            </div>
                        </div>
                    </div>
                </div>
                <div style="text-align: center; color: var(--text-secondary); font-size: 0.75rem;">
                    Your feedback has been ingested. Editors will review flagged items shortly. Thank you!
                </div>
            </div>
        </div>
    </div>

    <script>
        const form = document.getElementById('feedbackForm');
        const submitBtn = document.getElementById('submitBtn');
        const btnSpinner = document.getElementById('btnSpinner');
        const btnText = document.getElementById('btnText');
        const formError = document.getElementById('formError');
        const resultPanel = document.getElementById('resultPanel');

        // Form fields
        const rawTextInput = document.getElementById('raw_text');
        const languageSelect = document.getElementById('language');
        const channelSelect = document.getElementById('channel');

        // Result displays
        const resultSentiment = document.getElementById('resultSentiment');
        const resultCorrection = document.getElementById('resultCorrection');
        const resultUrgencyText = document.getElementById('resultUrgencyText');
        const resultUrgencyBar = document.getElementById('resultUrgencyBar');
        const detectedLang = document.getElementById('detectedLang');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            formError.style.display = 'none';
            resultPanel.style.display = 'none';

            const raw_text = rawTextInput.value.trim();
            if (!raw_text) {
                formError.textContent = "Please enter some feedback.";
                formError.style.display = 'block';
                return;
            }

            // Set loading state
            submitBtn.disabled = true;
            btnSpinner.style.display = 'inline-block';
            btnText.textContent = 'Processing with AI...';

            const payload = {
                raw_text: raw_text,
                channel: channelSelect.value
            };

            const langVal = languageSelect.value;
            if (langVal) {
                payload.language = langVal;
            }

            try {
                // Post to backend manually
                const response = await fetch('/ingest_manual', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify(payload)
                });

                if (!response.ok) {
                    throw new Error(`API error: ${response.status} ${response.statusText}`);
                }

                const data = await response.json();
                
                // Update result panel
                displayResults(data);
                
                // Clear form area
                rawTextInput.value = '';

            } catch (err) {
                formError.textContent = `Submission failed: ${err.message}. Please check if the server is running.`;
                formError.style.display = 'block';
            } finally {
                // Reset submit button state
                submitBtn.disabled = false;
                btnSpinner.style.display = 'none';
                btnText.textContent = 'Submit Feedback';
            }
        });

        function displayResults(data) {
            // 1. Sentiment badge
            const sentiment = data.sentiment || 'neutral';
            resultSentiment.innerHTML = `<span class="badge badge-${sentiment}">${sentiment}</span>`;

            // 2. Factual correction request
            const isCorr = data.correction_suggested;
            const corrClass = isCorr ? 'badge-yes' : 'badge-no';
            const corrText = isCorr ? 'Yes (Factual Correction)' : 'No';
            resultCorrection.innerHTML = `<span class="badge ${corrClass}">${corrText}</span>`;

            // 3. Urgency progress bar & text
            const urgency = data.urgency || 3;
            resultUrgencyText.textContent = `${urgency}/10`;
            resultUrgencyBar.style.width = `${urgency * 10}%`;

            // Choose bar color based on urgency level
            if (urgency >= 8) {
                resultUrgencyBar.style.backgroundColor = 'var(--danger-color)';
            } else if (urgency >= 5) {
                resultUrgencyBar.style.backgroundColor = 'var(--warning-color)';
            } else {
                resultUrgencyBar.style.backgroundColor = 'var(--success-color)';
            }

            // 4. Detected Language display
            detectedLang.textContent = data.language_detected ? data.language_detected.toUpperCase() : 'EN';

            // Show result panel
            resultPanel.style.display = 'block';
        }
    </script>
</body>
</html>
