name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Lint with flake8
        run: |
          pip install flake8
          flake8 app/ tests/ --max-line-length=100 --ignore=E501,W503 --count

      - name: Run tests with coverage
        env:
          DATABASE_URL: "sqlite://"
          AUTH_ENABLED: "false"
          USE_TRANSFORMER: "false"
        run: |
          pytest tests/ -v --cov=app --cov-report=term-missing --cov-report=xml

      - name: Upload coverage report
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build Docker image
        run: docker build -t newsroom-feedback:${{ github.sha }} .

      - name: Smoke test Docker image
        run: |
          docker run -d --name test_container \
            -e DATABASE_URL="sqlite:///./data/feedback.db" \
            -e AUTH_ENABLED="true" \
            -p 8000:8000 \
            newsroom-feedback:${{ github.sha }}
          sleep 8
          curl --fail http://localhost:8000/healthz
          docker stop test_container
